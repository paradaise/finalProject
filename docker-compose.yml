version: "3.9"

# ─── Sound Sentinel — Docker Compose ─────────────────────────────────────────
# Перед запуском:
#   1. Скопируйте .env.example в .env и укажите ваш IP
#   2. Создайте SSL-сертификаты: ./scripts/gen_certs.sh
#   3. docker compose up -d --build

services:
  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./mvp_sound_sentinel/backend
      dockerfile: Dockerfile
    image: sound-sentinel-backend:latest
    container_name: sound-sentinel-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data/db:/app/data # SQLite БД
      - ./mvp_sound_sentinel/backend/certs:/app/certs:ro # SSL сертификаты (read-only)
      - yamnet-model-cache:/app/cache/yamnet # Кэш YAMNet (~500MB, скачивается 1 раз)
    environment:
      - DB_PATH=/app/data/sound_sentinel.db
      - YAMNET_CACHE_DIR=/app/cache/yamnet
      - HOST=0.0.0.0
      - PORT=8000
      - SSL_KEY=/app/certs/key.pem
      - SSL_CERT=/app/certs/cert.pem
      - CONFIDENCE_THRESHOLD=0.3
      - CUSTOM_MATCH_DEFAULT_THRESHOLD=0.7
      # Укажите ваши IP-адреса для CORS
      - CORS_ORIGINS=https://localhost:3000,https://192.168.0.61:3000
    restart: unless-stopped
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD", "curl", "-kf", "https://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s # YAMNet грузится ~60 сек при первом запуске

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./mvp_sound_sentinel/frontend
      dockerfile: Dockerfile
      args:
        # IP сервера backend — должен быть доступен из браузера пользователя
        VITE_API_HOST: ${API_HOST:-192.168.0.61}
        VITE_API_PORT: ${API_PORT:-8000}
        VITE_USE_SSL: ${USE_SSL:-true}
    image: sound-sentinel-frontend:latest
    container_name: sound-sentinel-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sentinel-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  yamnet-model-cache:
    driver: local
    # Монтируем на хост чтобы не скачивать модель при каждой пересборке
    driver_opts:
      type: none
      o: bind
      device: ./data/yamnet-cache

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  sentinel-net:
    driver: bridge
